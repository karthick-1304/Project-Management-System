name: Keep Render backend awake

# Pings the Render health endpoint on a schedule so the free-tier instance
# doesn't sleep (which otherwise causes a ~30-50s cold start on first request).
on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: |
          echo "Pinging backend at $(date -u)"
          curl -sS -m 60 https://project-management-system-1osq.onrender.com/api/health || true
          echo
